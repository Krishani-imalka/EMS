<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="stylesheet" href="/CSS/Header.css"/>
  <link rel="stylesheet" href="/CSS/Event.css">

</head>

<body>

  <!-- ── HEADER ── -->
  <div th:replace="~{Fragments/Header :: header('Event Management')}"></div>

  <!-- ── MAIN ── -->
  <main>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
        <input type="text" id="searchInput" placeholder="Search events..." />
      </div>

      <select class="status-filter" id="statusFilter">
        <option value="">All Status</option>
        <option value="Pending" >Pending</option>
        <option value="Approved">Approved</option>
        <option value="Rejected">Rejected</option>
      </select>

      <button class="btn-create" id="toggleCreateBtn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14" />
        </svg>
        Create Event
      </button>
    </div>

    <!-- Create Event Panel -->
    <div class="create-panel" id="createPanel">
      <h2>Create New Event</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Event Name</label>
          <input type="text" id="newName" placeholder="Enter event name" />
        </div>
        <div class="form-group">
          <label>Organizer</label>
          <input type="text" id="newOrganizer" placeholder="Enter organizer" />
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="newDate" />
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="newLocation" placeholder="Enter location" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" id="cancelCreateBtn">Cancel</button>
        <button class="btn-submit" id="submitCreateBtn">Create Event</button>
      </div>
    </div>

    <!-- Events Table -->
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Event Name</th>
            <th>Organizer</th>
            <th>Date</th>
            <th>Location</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
        <tr th:each="event, stat : ${events}">
          <td class="td-num"      th:text="${stat.index + 1}"></td>
          <td class="td-name"     th:text="${event.eventName}"></td>
          <td class="td-email"    th:text="${event.organizer.fullName}"></td>
          <td class="td-role"     th:text="${event.eventDate}"></td>
          <td                     th:text="${event.location}"></td>
          <td>
        <span class="status-badge"
              th:classappend="${event.status.name() == 'APPROVED'  ? 'status-active'  :
                               (event.status.name() == 'PENDING'   ? 'status-pending' :
                               (event.status.name() == 'REJECTED'  ? 'status-blocked' :
                                                                      'status-blocked'))}"
              th:text="${event.status}">
        </span>
          </td>
          <td>
<!--            <div class="actions">-->
<!--              <button class="icon-actions  btn-icon.edit">Edit</button>-->
<!--              <button class="icon-actions  btn-icon.view ">Veiw</button>-->
<!--              <button class="btn-action btn-approve">Approve</button>-->
<!--              <button class="btn-action btn-reject">Reject</button>-->
<!--              <button class="btn-action btn-delete">Delete</button>-->
<!--            </div>-->

            <div class="actions">
              <!-- View icon -->
              <button class="btn-icon view" title="View">
                <svg viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>

              <!-- Edit icon -->
              <button class="btn-icon edit" title="Edit">
                <svg viewBox="0 0 24 24">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>

              <!-- Delete icon -->
              <button class="btn-icon del" title="Delete">
                <svg viewBox="0 0 24 24">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6M14 11v6"/>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
              </button>

              <button class="btn-action btn-approve">Approve</button>
              <button class="btn-action btn-reject">Reject</button>
            </div>

          </td>
        </tr>
        </tbody>


      </table>
    </div>

  </main>

  <!-- ── VIEW MODAL ── -->
  <div class="modal-overlay" id="viewModal" style="display:none;" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <h3>Event Details</h3>
        <button class="modal-close" onclick="document.getElementById('viewModal').style.display='none'">✕</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

</body>

</html>
