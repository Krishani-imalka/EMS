<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Management – UOR Faculty of Technology</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />


  <link rel="stylesheet" href="../../../../../Event.css">

</head>

<body>

  <!-- ── HEADER ── -->


  <!-- ── MAIN ── -->
  <main>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
        <input type="text" id="searchInput" placeholder="Search events..." />
      </div>

      <select class="status-filter" id="statusFilter">
        <option value="">All Status</option>
        <option value="Pending">Pending</option>
        <option value="Approved">Approved</option>
        <option value="Rejected">Rejected</option>
      </select>

      <button class="btn-create" id="toggleCreateBtn">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M12 5v14M5 12h14" />
        </svg>
        Create Event
      </button>
    </div>

    <!-- Create Event Panel -->
    <div class="create-panel" id="createPanel">
      <h2>Create New Event</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Event Name</label>
          <input type="text" id="newName" placeholder="Enter event name" />
        </div>
        <div class="form-group">
          <label>Organizer</label>
          <input type="text" id="newOrganizer" placeholder="Enter organizer" />
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="newDate" />
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="newLocation" placeholder="Enter location" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-cancel" id="cancelCreateBtn">Cancel</button>
        <button class="btn-submit" id="submitCreateBtn">Create Event</button>
      </div>
    </div>

    <!-- Events Table -->
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Event Name</th>
            <th>Organizer</th>
            <th>Date</th>
            <th>Location</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="eventTableBody"></tbody>
      </table>
    </div>

  </main>

  <!-- ── VIEW MODAL ── -->
  <div class="modal-overlay" id="viewModal" style="display:none;" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <h3>Event Details</h3>
        <button class="modal-close" onclick="document.getElementById('viewModal').style.display='none'">✕</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>
