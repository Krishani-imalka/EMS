<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="stylesheet" href="/CSS/Header.css"/>
  <link rel="stylesheet" href="/CSS/Event.css">

</head>

<body>

<!-- ── HEADER ── -->
<div th:replace="~{Fragments/Header :: header('Event Management')}"></div>

<!-- ── MAIN ── -->
<main>

  <!-- Flash messages -->
  <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
  <div th:if="${errorMsg}"   class="alert alert-error"   th:text="${errorMsg}"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8" />
        <path d="M21 21l-4.35-4.35" />
      </svg>
      <input type="text" id="searchInput" placeholder="Search events..." />
    </div>

    <select class="status-filter" id="statusFilter">
      <option value="">All Status</option>
      <option value="Pending" >Pending</option>
      <option value="Approved">Approved</option>
      <option value="Rejected">Rejected</option>
    </select>

    <button class="btn-create" id="toggleCreateBtn">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" />
      </svg>
      Create Event
    </button>
  </div>

  <!-- Create Event Panel -->
  <div class="add-panel" id="createPanel" style="display:none;">
    <h2>Create New Event</h2>

    <form th:action="@{/admin/events/create}" method="post" enctype="multipart/form-data">

      <div class="form-row">

        <div class="form-group">
          <label>Event Name <span class="required">*</span></label>
          <input type="text" name="eventName" placeholder="Enter event name" required/>
        </div>

        <div class="form-group">
          <label>Event Date <span class="required">*</span></label>
          <input type="date" name="eventDate" required/>
        </div>

        <div class="form-group">
          <label>Start Time <span class="required">*</span></label>
          <input type="time" name="startTime" required/>
        </div>

        <div class="form-group">
          <label>End Time <span class="required">*</span></label>
          <input type="time" name="endTime" required/>
        </div>

        <div class="form-group">
          <label>Location <span class="required">*</span></label>
          <input type="text" name="location" placeholder="Enter location" required/>
        </div>

        <div class="form-group">
          <label>Venue</label>
          <select name="venueName">
            <option value="">-- No specific venue --</option>
            <option th:each="v : ${venues}"
                    th:value="${v.vName}"
                    th:text="${v.vName}">
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Category <span class="required">*</span></label>
          <select name="category" required>
            <option value="">-- Select category --</option>
            <option value="ACADEMIC">Academic</option>
            <option value="CULTURAL">Cultural</option>
            <option value="SPORTS">Sports</option>
            <option value="WORKSHOP">Workshop</option>
            <option value="SEMINAR">Seminar</option>
          </select>
        </div>

        <div class="form-group">
          <label>Expected Attendees <span class="required">*</span></label>
          <input type="number" name="expectedAttendees" placeholder="e.g. 100" min="1" required/>
        </div>

        <div class="form-group">
          <label>Contact Info <span class="required">*</span></label>
          <input type="text" name="contactInfo" placeholder="Phone or email" required/>
        </div>

        <div class="form-group">
          <label>Organizer User ID <span class="required">*</span></label>
          <input type="text" name="organizerUserId" placeholder="Enter organizer user ID" required/>
        </div>

        <div class="form-group">
          <label>Banner Image</label>
          <input type="file" name="bannerImage" accept="image/*"/>
        </div>

        <div class="form-group form-group-wide">
          <label>Description <span class="required">*</span></label>
          <textarea name="description" rows="3" placeholder="Describe the event..." required
                    style="width:100%;padding:10px 14px;border:1.5px solid var(--border);
                           border-radius:var(--radius-sm);font-family:inherit;font-size:0.9rem;
                           resize:vertical;background:var(--surface2);"></textarea>
        </div>

        <button type="submit" class="btn-create" style="align-self:flex-end;">
          Save Event
        </button>

      </div><!-- /form-row -->
    </form>
  </div><!-- /createPanel -->

  <!-- ══════════════════════════════════════════════════════════════
       EDIT EVENT PANEL  (inline, hidden until edit icon clicked)
       ══════════════════════════════════════════════════════════════ -->
  <div class="add-panel" id="editPanel" style="display:none;">
    <h2>Edit Event</h2>

    <form id="editForm" method="post" enctype="multipart/form-data">

      <!-- hidden CSRF if you use Spring Security -->
      <!-- <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/> -->

      <div class="form-row">

        <div class="form-group">
          <label>Event Name <span class="required">*</span></label>
          <input type="text" id="edit_eventName" name="eventName" placeholder="Enter event name" required/>
        </div>

        <div class="form-group">
          <label>Event Date <span class="required">*</span></label>
          <input type="date" id="edit_eventDate" name="eventDate" required/>
        </div>

        <div class="form-group">
          <label>Start Time <span class="required">*</span></label>
          <input type="time" id="edit_startTime" name="startTime" required/>
        </div>

        <div class="form-group">
          <label>End Time <span class="required">*</span></label>
          <input type="time" id="edit_endTime" name="endTime" required/>
        </div>

        <div class="form-group">
          <label>Location <span class="required">*</span></label>
          <input type="text" id="edit_location" name="location" placeholder="Enter location" required/>
        </div>

        <div class="form-group">
          <label>Venue</label>
          <select id="edit_venueName" name="venueName">
            <option value="">-- No specific venue --</option>
            <option th:each="v : ${venues}"
                    th:value="${v.vName}"
                    th:text="${v.vName}">
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Category <span class="required">*</span></label>
          <select id="edit_category" name="category" required>
            <option value="ACADEMIC">Academic</option>
            <option value="CULTURAL">Cultural</option>
            <option value="SPORTS">Sports</option>
            <option value="WORKSHOP">Workshop</option>
            <option value="SEMINAR">Seminar</option>
          </select>
        </div>

        <div class="form-group">
          <label>Expected Attendees <span class="required">*</span></label>
          <input type="number" id="edit_expectedAttendees" name="expectedAttendees" min="1" required/>
        </div>

        <div class="form-group">
          <label>Contact Info <span class="required">*</span></label>
          <input type="text" id="edit_contactInfo" name="contactInfo" placeholder="Phone or email" required/>
        </div>

        <div class="form-group">
          <label>Banner Image <small style="color:var(--text-muted)">(leave blank to keep current)</small></label>
          <input type="file" name="bannerImage" accept="image/*"/>
        </div>

        <div class="form-group form-group-wide">
          <label>Description <span class="required">*</span></label>
          <textarea id="edit_description" name="description" rows="3" required
                    style="width:100%;padding:10px 14px;border:1.5px solid var(--border);
                           border-radius:var(--radius-sm);font-family:inherit;font-size:0.9rem;
                           resize:vertical;background:var(--surface2);"></textarea>
        </div>

        <div style="display:flex;gap:10px;align-self:flex-end;">
          <button type="button" class="btn-cancel" onclick="closeEditPanel()">Cancel</button>
          <button type="submit" class="btn-create">Update Event</button>
        </div>

      </div><!-- /form-row -->
    </form>
  </div><!-- /editPanel -->

  <!-- ── EVENTS TABLE ── -->
  <div class="table-card">
    <table id="eventsTable">
      <thead>
      <tr>
        <th>#</th>
        <th>Event Name</th>
        <th>Organizer</th>
        <th>Date</th>
        <th>Location</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="event, stat : ${events}"
          th:data-status="${event.status.name()}"
          th:data-name="${event.eventName}">

        <td class="td-num"  th:text="${stat.index + 1}"></td>
        <td class="td-name" th:text="${event.eventName}"></td>
        <td class="td-org"  th:text="${event.organizer.fullName}"></td>
        <td class="td-date" th:text="${event.eventDate}"></td>
        <td class="td-loc"  th:text="${event.location}"></td>

        <!-- Status badge -->
        <td>
            <span class="status-badge"
                  th:classappend="${event.status.name() == 'APPROVED'  ? ' s-approved' :
                                   (event.status.name() == 'PENDING'   ? ' s-pending'  :
                                   (event.status.name() == 'REJECTED'  ? ' s-rejected' : ' s-rejected'))}"
                  th:text="${event.status}">
            </span>
        </td>

        <!-- Action buttons -->
        <td class="td-actions">
          <div class="actions">

            <!-- VIEW -->
            <button class="btn-icon view" title="View"
                    th:onclick="|viewEvent(${event.eventId})|">
              <svg viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>

            <!-- EDIT -->
<!--            <a th:href="@{/admin/events/{id}/edit(id=${event.eventId})}"-->
<!--               class="btn-icon edit" title="Edit">-->
            <button class="btn-icon edit" title="Edit"
                    th:onclick="|editEvent(${event.eventId})|">
              <svg viewBox="0 0 24 24">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>

            <!-- DELETE (POST form) -->
            <form th:action="@{/admin/events/{id}/delete(id=${event.eventId})}"
                  method="post" style="display:inline;"
                  onsubmit="return confirm('Delete this event? This cannot be undone.');">
              <input type="hidden" name="_method" value="POST"/>
              <button type="submit" class="btn-icon del" title="Delete">
                <svg viewBox="0 0 24 24">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6M14 11v6"/>
                  <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
              </button>
            </form>

            <!-- APPROVE (POST form) -->
            <form th:action="@{/admin/events/{id}/approve(id=${event.eventId})}"
                  method="post" style="display:inline;">
              <button type="submit" class="btn-action btn-approve">Approve</button>
            </form>

            <!-- REJECT (POST form, opens remarks modal) -->
            <button class="btn-action btn-reject"
                    th:onclick="|openRejectModal(${event.eventId})|">
              Reject
            </button>

          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

</main>

<!-- ══════════════════════════════════════════════════════════════
     VIEW MODAL
     ══════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="viewModal" style="display:none;" onclick="closeViewModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3>Event Details</h3>
      <button class="modal-close" onclick="document.getElementById('viewModal').style.display='none'">✕</button>
    </div>
    <div id="modalBody">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════
     REJECT MODAL (with remarks)
     ══════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="rejectModal" style="display:none;" onclick="closeRejectModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3>Reject Event</h3>
      <button class="modal-close" onclick="document.getElementById('rejectModal').style.display='none'">✕</button>
    </div>
    <form id="rejectForm" method="post">
      <div class="form-group" style="margin-bottom:16px;">
        <label style="font-size:0.85rem;font-weight:600;color:var(--text-secondary);">
          Admin Remarks (optional)
        </label>
        <textarea name="adminRemarks" rows="4"
                  style="width:100%;margin-top:8px;padding:10px 14px;border:1.5px solid var(--border);
                         border-radius:var(--radius-sm);font-family:inherit;font-size:0.9rem;resize:vertical;"
                  placeholder="Provide a reason for rejection..."></textarea>
      </div>
      <div class="form-actions">
        <button type="button" class="btn-cancel"
                onclick="document.getElementById('rejectModal').style.display='none'">Cancel</button>
        <button type="submit" class="btn-action btn-reject" style="padding:10px 24px;">
          Confirm Reject
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  /* ── Create panel toggle ── */
  document.getElementById('toggleCreateBtn').addEventListener('click', function () {
    const panel = document.getElementById('createPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  });

  const cancelBtn = document.getElementById('cancelCreateBtn');
  if (cancelBtn) {
    cancelBtn.addEventListener('click', function () {
      document.getElementById('createPanel').style.display = 'none';
    });
  }

  /* ── Client-side search + status filter ── */
  function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('statusFilter').value.toUpperCase();
    document.querySelectorAll('#eventsTable tbody tr').forEach(function (row) {
      const name     = (row.dataset.name   || '').toLowerCase();
      const rowStatus = (row.dataset.status || '').toUpperCase();
      const matchSearch = !search || name.includes(search);
      const matchStatus = !status || rowStatus === status;
      row.style.display = matchSearch && matchStatus ? '' : 'none';
    });
  }
  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('statusFilter').addEventListener('change', applyFilters);

  /* ── View modal ── */
  function viewEvent(id) {
    fetch('/admin/events/' + id)
            .then(function (r) { return r.json(); })
            .then(function (e) {
              var html =
                      row('Event Name',  e.eventName)      +
                      row('Organizer',   e.organizer)       +
                      row('Date',        e.eventDate)       +
                      row('Time',        e.startTime + ' – ' + e.endTime) +
                      row('Location',    e.location)        +
                      row('Venue',       e.venue)           +
                      row('Category',    e.category)        +
                      row('Attendees',   e.expectedAttendees) +
                      row('Contact',     e.contactInfo)     +
                      row('Status',      e.status)          +
                      row('Remarks',     e.adminRemarks || '—') +
                      row('Description', e.description)    +
                      row('Created',     e.createdAt);

              document.getElementById('modalBody').innerHTML = html;
              document.getElementById('viewModal').style.display = 'flex';
            })
            .catch(function () {
              alert('Could not load event details.');
            });
  }

  function row(label, value) {
    return '<div class="modal-row">' +
            '<span class="label">' + label + '</span>' +
            '<span class="value">' + (value !== undefined && value !== null ? value : '—') + '</span>' +
            '</div>';
  }

  function closeViewModal(e) {
    if (e.target === document.getElementById('viewModal')) {
      document.getElementById('viewModal').style.display = 'none';
    }
  }

  /* ── Reject modal ── */
  function openRejectModal(id) {
    document.getElementById('rejectForm').action = '/admin/events/' + id + '/reject';
    document.getElementById('rejectModal').style.display = 'flex';
  }

  function closeRejectModal(e) {
    if (e.target === document.getElementById('rejectModal')) {
      document.getElementById('rejectModal').style.display = 'none';
    }
  }
  function editEvent(id) {
    fetch('/admin/events/' + id)
            .then(r => r.json())
            .then(e => {

              // Fill form fields
              document.getElementById('edit_eventName').value = e.eventName;
              document.getElementById('edit_eventDate').value = e.eventDate;
              document.getElementById('edit_startTime').value = e.startTime;
              document.getElementById('edit_endTime').value = e.endTime;
              document.getElementById('edit_location').value = e.location;
              document.getElementById('edit_category').value = e.category;
              document.getElementById('edit_expectedAttendees').value = e.expectedAttendees;
              document.getElementById('edit_contactInfo').value = e.contactInfo;
              document.getElementById('edit_description').value = e.description;

              // venue
              if (e.venue && e.venue !== 'N/A') {
                document.getElementById('edit_venueName').value = e.venue;
              }

              // Set form action dynamically
              document.getElementById('editForm').action = '/admin/events/' + id + '/edit';

              // Show panel
              document.getElementById('editPanel').style.display = 'block';

              // Hide create panel if open
              document.getElementById('createPanel').style.display = 'none';
            })
            .catch(() => alert("Failed to load event"));
  }

  function closeEditPanel() {
    document.getElementById('editPanel').style.display = 'none';
  }

</script>
</body>

</html>
