<!DOCTYPE html>
<!--<html lang="en">-->
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/CSS/Header.css"/>
  <link rel="stylesheet" href="/CSS/user_management.css">

</head>

<body>


  <!-- ── HEADER ── -->
  <div th:replace="~{Fragments/Header :: header('User Management')}"></div>

  <!-- ── MAIN ── -->
  <main>

    <!-- Alerts -->
    <div th:if="${successMessage}" class="alert-success-bar" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}"   class="alert-error-bar"   th:text="${errorMessage}"></div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
        <input type="text" placeholder="Search users..." id="searchInput" />
      </div>

      <select class=" role-filter" id="roleFilter">
          <option value="">All Roles</option>
          <option value="Student">Student</option>
          <option value="Organizer">Organizer</option>
          <option value="Admin">Admin</option>
          </select>

          <button class="btn-add" id="toggleFormBtn">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M12 5v14M5 12h14" />
            </svg>
            Add User
          </button>
    </div>

    <!-- Add User Panel-->
    <div class="add-panel" id="addPanel" style="display:none;">
      <h2>Add New User</h2>

      <form th:action="@{/admin/users/create}" method="post">
        <div class="form-row">

          <div class="form-group">
            <label>Full Name <span class="required">*</span></label>
            <input type="text" name="fullName" placeholder="Enter full name"/>
          </div>

          <div class="form-group">
            <label>Email <span class="required">*</span></label>
            <input type="email" name="email" placeholder="Enter email"/>
          </div>

          <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" placeholder="Enter phone"/>
          </div>

          <div class="form-group">
            <label>Department</label>
            <input type="text" name="department" placeholder="Enter department"/>
          </div>

          <div class="form-group" style="max-width:160px;">
            <label>Role <span class="required">*</span></label>
            <select name="role">
              <option value="STUDENT">Student</option>
              <option value="ORGANIZER">Organizer</option>
              <option value="ADMIN">Admin</option>
            </select>
          </div>

          <button type="submit" class="btn-create">Create User</button>
        </div>
      </form>
    </div>

    <!-- Users Table -->
    <div class="table-card">
      <table id="userTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
        <tr th:each="user, stat : ${users}"
            th:data-name="${user.fullName}"
            th:data-email="${user.email}"
            th:data-role="${user.role}">

          <td class="td-num" th:text="${stat.index + 1}"></td>
          <td class="td-name" th:text="${user.fullName}"></td>
          <td class="td-email" th:text="${user.email}"></td>
          <td class="td-role" th:text="${user.role}"></td>
          <td>
             <span class="status-badge"
                   th:classappend="${user.status.name() == 'ACTIVE' ? 'status-active' :
                        (user.status.name() == 'PENDING' ? 'status-pending' :
                        'status-blocked')}"
                   th:text="${user.status}">
             </span>
          </td>
          <td>
            <div class="actions">

              <!-- ✅ View icon — data attributes instead of th:onclick -->
              <button type="button" class="btn-icon btn-view"
                      th:data-fullname="${user.fullName}"
                      th:data-username="${user.username}"
                      th:data-email="${user.email}"
                      th:data-phone="${user.phone} ?: ''"
                      th:data-department="${user.department} ?: ''"
                      th:data-role="${user.role}"
                      th:data-status="${user.status}"
                      onclick="openViewFromBtn(this)"
                      title="View Details">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>

              <!-- ✅ Edit icon — data attributes instead of th:onclick -->
              <button type="button" class="btn-icon btn-edit"
                      th:data-userid="${user.userId}"
                      th:data-fullname="${user.fullName}"
                      th:data-email="${user.email}"
                      th:data-phone="${user.phone} ?: ''"
                      th:data-department="${user.department} ?: ''"
                      th:data-role="${user.role}"
                      th:data-status="${user.status}"
                      onclick="openEditFromBtn(this)"
                      title="Edit User">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>

              <!-- Authorize -->
              <form th:action="@{/admin/users/authorize/{id}(id=${user.userId})}"
                    method="post" style="display:inline;">
                <button type="submit" class="btn-action btn-authorize">
                  Authorize
                </button>
              </form>

              <!-- Block -->
              <form th:action="@{/admin/users/block/{id}(id=${user.userId})}"
                    method="post" style="display:inline;">
                <button type="submit" class="btn-action btn-block">
                  Block
                </button>
              </form>

              <!-- Delete -->
              <form th:action="@{/admin/users/delete/{id}(id=${user.userId})}"
                    method="post" style="display:inline;"
                    onsubmit="return confirm('Are you sure you want to delete this user?');">
                <button type="submit" class="btn-action btn-delete">
                  Delete
                </button>
              </form>

            </div>
          </td>
        </tr>
        </tbody>

      </table>
    </div>

  </main>

  <!-- ═══════════════════════════════════════
       VIEW MODAL
  ═══════════════════════════════════════ -->
  <div id="viewModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <h3>User Details</h3>
        <button class="modal-close" onclick="closeView()">✕</button>
      </div>
      <div class="modal-body">
        <div class="view-avatar" id="viewAvatar">U</div>
        <div class="view-grid">
          <div class="view-field">
            <label>Full Name</label>
            <div class="view-val" id="vFullName"></div>
          </div>
          <div class="view-field">
            <label>Username</label>
            <div class="view-val" id="vUsername"></div>
          </div>
          <div class="view-field full">
            <label>Email</label>
            <div class="view-val" id="vEmail"></div>
          </div>
          <div class="view-field">
            <label>Phone</label>
            <div class="view-val" id="vPhone"></div>
          </div>
          <div class="view-field">
            <label>Department</label>
            <div class="view-val" id="vDepartment"></div>
          </div>
          <div class="view-field">
            <label>Role</label>
            <div class="view-val" id="vRole"></div>
          </div>
          <div class="view-field">
            <label>Status</label>
            <div class="view-val" id="vStatus"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-close" onclick="closeView()">Close</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       EDIT MODAL
  ═══════════════════════════════════════ -->
  <div id="editModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Edit User</h3>
        <button class="modal-close" onclick="closeEdit()">✕</button>
      </div>
      <form id="editForm" method="post">
        <div class="modal-body">
          <div class="view-grid">
            <div class="view-field full">
              <label>Full Name <span class="required">*</span></label>
              <input type="text" id="eFullName" name="fullName" class="edit-input"/>
            </div>
            <div class="view-field full">
              <label>Email <span class="required">*</span></label>
              <input type="email" id="eEmail" name="email" class="edit-input"/>
            </div>
            <div class="view-field">
              <label>Phone</label>
              <input type="text" id="ePhone" name="phone" class="edit-input"/>
            </div>
            <div class="view-field">
              <label>Department</label>
              <input type="text" id="eDepartment" name="department" class="edit-input"/>
            </div>
            <div class="view-field">
              <label>Role</label>
              <select id="eRole" name="role" class="edit-input">
                <option value="STUDENT">Student</option>
                <option value="ORGANIZER">Organizer</option>
                <option value="ADMIN">Admin</option>
              </select>
            </div>
            <div class="view-field">
              <label>Status</label>
              <select id="eStatus" name="status" class="edit-input">
                <option value="ACTIVE">Active</option>
                <option value="PENDING">Pending</option>
                <option value="BLOCKED">Blocked</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-modal-close" onclick="closeEdit()">Cancel</button>
          <button type="submit" class="btn-modal-save">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
  <script>
    // ── Add User panel toggle ─────────────────────────────────────────────────
    document.getElementById('toggleFormBtn').addEventListener('click', () => {
      const p = document.getElementById('addPanel');
      p.style.display = (p.style.display === 'none' || !p.style.display) ? 'block' : 'none';
    });

    // ── Search + filter ───────────────────────────────────────────────────────
    const searchInput = document.getElementById('searchInput');
    const roleFilter  = document.getElementById('roleFilter');
    const tbody       = document.querySelector('#userTable tbody');

    function filterTable() {
      const search = searchInput.value.toLowerCase().trim();
      const role   = roleFilter.value.toUpperCase().trim();
      tbody.querySelectorAll('tr').forEach(row => {
        const name  = (row.getAttribute('data-name')  || '').toLowerCase();
        const email = (row.getAttribute('data-email') || '').toLowerCase();
        const rRole = (row.getAttribute('data-role')  || '').toUpperCase();
        const matchSearch = search === '' || name.includes(search) || email.includes(search);
        const matchRole   = role   === '' || rRole === role;
        row.style.display = matchSearch && matchRole ? '' : 'none';
      });
    }
    searchInput.addEventListener('input',  filterTable);
    roleFilter.addEventListener('change', filterTable);

    // ── VIEW popup — reads from data-* attributes ─────────────────────────────
    function openViewFromBtn(btn) {
      const d = btn.dataset;
      document.getElementById('viewAvatar').textContent    = (d.fullname || 'U').charAt(0).toUpperCase();
      document.getElementById('vFullName').textContent     = d.fullname   || '—';
      document.getElementById('vUsername').textContent     = d.username   || '—';
      document.getElementById('vEmail').textContent        = d.email      || '—';
      document.getElementById('vPhone').textContent        = d.phone      || 'Not provided';
      document.getElementById('vDepartment').textContent   = d.department || 'Not provided';
      document.getElementById('vRole').textContent         = d.role       || '—';
      document.getElementById('vStatus').textContent       = d.status     || '—';
      document.getElementById('viewModal').style.display   = 'flex';
    }

    function closeView() {
      document.getElementById('viewModal').style.display = 'none';
    }

    // ── EDIT popup — reads from data-* attributes ─────────────────────────────
    function openEditFromBtn(btn) {
      const d = btn.dataset;
      document.getElementById('editForm').action       = '/admin/users/edit/' + d.userid;
      document.getElementById('eFullName').value       = d.fullname   || '';
      document.getElementById('eEmail').value          = d.email      || '';
      document.getElementById('ePhone').value          = d.phone      || '';
      document.getElementById('eDepartment').value     = d.department || '';
      document.getElementById('eRole').value           = d.role       || 'STUDENT';
      document.getElementById('eStatus').value         = d.status     || 'PENDING';
      document.getElementById('editModal').style.display = 'flex';
    }

    function closeEdit() {
      document.getElementById('editModal').style.display = 'none';
    }

    // Close modals clicking outside
    document.getElementById('viewModal').addEventListener('click', function(e) {
      if (e.target === this) closeView();
    });
    document.getElementById('editModal').addEventListener('click', function(e) {
      if (e.target === this) closeEdit();
    });
  </script>
</body>

</html>
