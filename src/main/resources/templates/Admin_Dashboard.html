<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <link rel="stylesheet" href="/CSS/Header.css"/>
  <link rel="stylesheet" href="/CSS/Admin_dashboard.css">

</head>
<body>

<!-- HEADER -->
<div th:replace="~{Fragments/Header :: header('Admin Dashboard')}"></div>

<main class="content">

  <!-- ── Stat Cards ───────────────────────────────────────────── -->
  <div class="stats-grid">

    <!-- Total Users: COUNT(*) FROM users -->
    <div class="stat-card">
      <div class="stat-icon blue">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <div>
        <div class="stat-label">Total Users</div>
        <div class="stat-value" th:text="${totalUsers}">0</div>
      </div>
    </div>

    <!-- Pending Approvals: COUNT(*) FROM events WHERE status='PENDING' -->
    <div class="stat-card">
      <div class="stat-icon yellow">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <div>
        <div class="stat-label">Pending Approvals</div>
        <div class="stat-value" th:text="${pendingApprovals}">0</div>
      </div>
    </div>

    <!-- Active Events: COUNT(*) FROM events WHERE status='APPROVED' -->
    <div class="stat-card">
      <div class="stat-icon green">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </div>
      <div>
        <div class="stat-label">Active Events</div>
        <div class="stat-value" th:text="${activeEvents}">0</div>
      </div>
    </div>

    <!-- Total Events: COUNT(*) FROM events -->
    <div class="stat-card">
      <div class="stat-icon purple">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <div>
        <div class="stat-label">Total Events</div>
        <div class="stat-value" th:text="${totalEvents}">0</div>
      </div>
    </div>

  </div>

  <!-- ── Bottom Panels ─────────────────────────────────────────── -->
  <div class="bottom-grid">

    <!-- Pending Event Approvals Table -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Pending Event Approvals</div>
      </div>
      <table>
        <thead>
        <tr>
          <th>Event</th>
          <th>Organizer</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <!-- event.eventName, event.organizer.fullName, event.eventDate, event.eventId -->
        <tr th:each="event : ${pendingEvents}">
          <td>
            <span class="event-name" th:text="${event.eventName}">Event Name</span>
          </td>
          <td th:text="${event.organizer.fullName}">Organizer</td>
          <td th:text="${#temporals.format(event.eventDate, 'yyyy-MM-dd')}">Date</td>
          <td>
            <div class="btn-group">
              <form th:action="@{/admin/events/{id}/approved(id=${event.eventId})}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-approve">Approve</button>
              </form>
              <form th:action="@{/admin/events/{id}/reject(id=${event.eventId})}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-reject">Reject</button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(pendingEvents)}">
          <td colspan="4" style="text-align:center; color:#aaa; padding:20px;">No pending events</td>
        </tr>
        </tbody>
      </table>
    </div>

    <!-- Recent User Registrations Table -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Recent User Registrations</div>
      </div>
      <table>
        <thead>
        <tr>
          <th>Name</th>
          <th>Role</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <!-- user.fullName, user.email, user.role, user.status, user.userId -->
        <tr th:each="user : ${pendingUsers}">
          <td>
            <div class="user-cell-name" th:text="${user.fullName}">Name</div>
            <div class="user-cell-email" th:text="${user.email}">email@uor.ac.lk</div>
          </td>
          <td th:text="${user.role}">Role</td>
          <td>
            <span class="status-badge status-pending" th:text="${user.status}">Pending</span>
          </td>
          <td>
            <div class="btn-group">
              <form th:action="@{/admin/users/{id}/active(id=${user.userId})}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-authorize">Authorize</button>
              </form>
              <form th:action="@{/admin/users/{id}/block(id=${user.userId})}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-block">Block</button>
              </form>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(pendingUsers)}">
          <td colspan="4" style="text-align:center; color:#aaa; padding:20px;">No pending registrations</td>
        </tr>
        </tbody>
      </table>
    </div>

  </div>

</main>

</body>
</html>
