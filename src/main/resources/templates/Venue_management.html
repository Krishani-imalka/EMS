<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="stylesheet" href="/CSS/Header.css"/>
    <link rel="stylesheet" href="/CSS/Venue_Management.css"/>
</head>

<body>

<div th:replace="~{Fragments/Header :: header('Venue Management')}"></div>

<div class="vm-wrapper">

    <!-- Page Header -->
    <div class="vm-page-header">

        <button class="btn-add" onclick="toggleForm()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add Venue
        </button>
    </div>

    <!-- Flash Messages -->
    <div th:if="${successMsg}" class="vm-banner vm-banner-success">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="9 12 11 14 15 10"/>
        </svg>
        <span th:text="${successMsg}"></span>
    </div>
    <div th:if="${errorMsg}" class="vm-banner vm-banner-error">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span th:text="${errorMsg}"></span>
    </div>

    <!-- Inline Add Venue Form (hidden by default) -->
    <div class="vm-inline-form" id="inlineForm" style="display:none;">
        <h3 class="vm-inline-title">Add New Venue</h3>
        <form th:action="@{/admin/venues/add}" method="post">
            <div class="vm-inline-fields">

                <div class="vm-field-group">
                    <label class="vm-label">Venue Name <span class="req">*</span></label>
                    <input type="text" name="vName" class="vm-input"
                           placeholder="e.g. Main Auditorium"
                           required maxlength="200"/>
                </div>

                <div class="vm-field-group">
                    <label class="vm-label">Location <span class="req">*</span></label>
                    <input type="text" name="location" class="vm-input"
                           placeholder="e.g. Block A, Ground Floor"
                           required maxlength="50"/>
                </div>

                <div class="vm-field-group">
                    <label class="vm-label">Description <span class="opt">(optional)</span></label>
                    <input type="text" name="description" class="vm-input"
                           placeholder="e.g. Large hall with 500 seats"/>
                </div>

                <div class="vm-field-group vm-field-btn">
                    <label class="vm-label">&nbsp;</label>
                    <button type="submit" class="btn-submit">
                        Create Venue
                    </button>
                </div>

            </div>
        </form>
    </div>

    <!-- Venue Table -->
    <div class="vm-card">
        <table class="vm-table">
            <thead>
            <tr>
                <th>#</th>
                <th>Venue Name</th>
                <th>Location</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="venue, iter : ${venues}">
                <td class="vm-index" th:text="${iter.count}">1</td>
                <td>
                    <div class="vm-venue-name" th:text="${venue.vName}">Venue Name</div>
                </td>
                <td>
                    <div class="vm-location">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2">
                            <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                        <span th:text="${venue.location}">Location</span>
                    </div>
                </td>
                <td>
            <span class="vm-description"
                  th:text="${venue.description != null ? venue.description : '—'}">—</span>
                </td>
                <td>
                    <form th:action="@{/admin/venues/{id}/delete(id=${venue.vName})}"
                          method="post"
                          onsubmit="return confirm('Delete this venue? This action cannot be undone.');">
                        <button type="submit" class="btn-delete">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6l-1 14H6L5 6"/>
                                <path d="M10 11v6M14 11v6"/>
                                <path d="M9 6V4h6v2"/>
                            </svg>
                            Delete
                        </button>
                    </form>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(venues)}">
                <td colspan="5" class="vm-empty">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
                         stroke="#d1d5db" stroke-width="1.5">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    <p>No venues found. Add your first venue.</p>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
    function toggleForm() {
        const form = document.getElementById('inlineForm');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    // Close form with Escape key
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            document.getElementById('inlineForm').style.display = 'none';
        }
    });
</script>

</body>
</html>
