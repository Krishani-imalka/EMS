<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <link rel="stylesheet" href="/CSS/FilterEvent.css">
</head>

<body>

<div class="events-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>Filters</h3>
    <form th:action="@{/student/filter-events}" method="get">

      <!-- Search -->
      <div class="filter-group">
        <h4>Search</h4>
        <input type="text" name="search"
               th:value="${search}"
               placeholder="Search events…">
      </div>

      <!-- Category -->
      <div class="filter-group">
        <h4>Category</h4>
        <label>
          <input type="radio" name="category" value=""
                 th:checked="${category == null or category == ''}"> All
        </label>
        <label>
          <input type="radio" name="category" value="ACADEMIC"
                 th:checked="${category == 'ACADEMIC'}"> Academic
        </label>
        <label>
          <input type="radio" name="category" value="WORKSHOP"
                 th:checked="${category == 'WORKSHOP'}"> Workshop
        </label>
        <label>
          <input type="radio" name="category" value="SEMINAR"
                 th:checked="${category == 'SEMINAR'}"> Seminar
        </label>
        <label>
          <input type="radio" name="category" value="CULTURAL"
                 th:checked="${category == 'CULTURAL'}"> Cultural
        </label>
        <label>
          <input type="radio" name="category" value="SPORTS"
                 th:checked="${category == 'SPORTS'}"> Sports
        </label>
      </div>

      <!-- Date Range -->
      <div class="filter-group">
        <h4>Date Range</h4>
        <input type="date" name="dateFrom"
               th:value="${dateFrom}">
        <input type="date" name="dateTo"
               th:value="${dateTo}">
      </div>

      <!-- Location -->
      <div class="filter-group">
        <h4>Location</h4>
        <select name="location">
          <option value="">All Locations</option>
          <option th:each="loc : ${locations}"
                  th:value="${loc}"
                  th:text="${loc}"
                  th:selected="${loc == location}">
          </option>
        </select>
      </div>

      <button type="submit" class="btn-apply">Apply Filters</button>
      <a th:href="@{/student/filter-events}" class="btn-clear">Clear Filters</a>

    </form>
  </aside>

  <!-- MAIN -->
  <main class="events-main">

    <!-- Results Count -->
    <div class="results-count"
         th:text="${totalEvents} + ' event' + (${totalEvents} != 1 ? 's' : '') + ' found'">
    </div>

    <!-- Events Grid -->
    <div class="events-grid">

      <!-- No Results -->
      <div th:if="${#lists.isEmpty(events)}" class="no-results">
        <svg width="40" height="40" fill="none" stroke="currentColor"
             stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        No events match your filters.
      </div>

      <!-- Event Cards -->
      <div th:each="e : ${events}" class="event-card">
        <div class="card-banner">
          <svg width="28" height="28" fill="none" stroke="currentColor"
               stroke-width="1.5" viewBox="0 0 24 24">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          <span th:text="${e.category}">Category</span>
        </div>
        <div class="card-body">
            <span class="badge"
                  th:classappend="'badge-' + ${#strings.toLowerCase(e.category)}"
                  th:text="${e.category}">Category</span>
          <div class="card-title" th:text="${e.eventName}">Event Name</div>
          <div class="card-meta">
            <svg width="14" height="14" fill="none" stroke="currentColor"
                 stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="18" rx="2"/>
              <path d="M16 2v4M8 2v4M3 10h18"/>
            </svg>
            <span th:text="${#temporals.format(e.eventDate, 'MMM dd, yyyy')}">Date</span>
            &bull;
            <span th:text="${#temporals.format(e.startTime, 'hh:mm a')}">Time</span>
          </div>
          <div class="card-meta">
            <svg width="14" height="14" fill="none" stroke="currentColor"
                 stroke-width="2" viewBox="0 0 24 24">
              <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <span th:text="${e.location}">Location</span>
          </div>
          <button class="btn-view">View Details</button>
        </div>
      </div>

    </div>
  </main>

</div>

</body>
</html>
