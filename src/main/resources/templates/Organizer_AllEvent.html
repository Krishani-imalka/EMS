<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="/CSS/Header.css"/>
    <link rel="stylesheet" href="/CSS/Organizer_AllEvent.css">
</head>

<body>
<div th:replace="~{Fragments/Header :: header('My Events')}"></div>

    <div class="toolbar">
        <div class="search-wrap">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
            </svg>
            <input class="search-input" type="text" id="searchInput" placeholder="Search my events...">
        </div>
        <select class="status-select" id="statusFilter">
            <option value="all">All Status</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
        </select>
    </div>

    <div class="grid" id="eventsGrid"></div>

</body>

</html>
