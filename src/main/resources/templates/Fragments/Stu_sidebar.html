<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="/CSS/Sidebar.css">
</head>

<body>

  <aside class="sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
      <div class="brand-icon">🎓</div>
      <div class="brand-text">
        <strong>UOR</strong>
        <span>Faculty of Technology</span>
      </div>
    </div>

    <!-- Navigation -->
    <nav>
      <p class="nav-section-label">Student Panel</p>


      <a class="nav-item active" onclick="loadPage(this, '/student/dashboard')">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
        Dashboard
      </a>

      <a class="nav-item " onclick="loadPage(this, '/student/filter-events')">
        <svg viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        Brows Events
      </a>

      <a class="nav-item" onclick="loadPage(this, '/student/register-page')">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="18" rx="2" />
          <line x1="16" y1="2" x2="16" y2="6" />
          <line x1="8" y1="2" x2="8" y2="6" />
          <line x1="3" y1="10" x2="21" y2="10" />
        </svg>
        Event Register
      </a>
    </nav>


    <div class="sidebar-logout">
      <button class="logout-btn" onclick="window.top.location.href='/logout'">
        <svg viewBox="0 0 24 24">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Logout
      </button>
    </div>

  </aside>



  <main class="page-content">

    <iframe id="mainFrame" src="/student/dashboard"></iframe>


  </main>

  <script>
    function loadPage(clickedLink, url) {
      // Load the URL into the iframe
      document.getElementById('mainFrame').src = url;

      // Remove active from all nav items
      document.querySelectorAll('.nav-item').forEach(function (item) {
        item.classList.remove('active');
      });

      // Highlight the clicked link
      if (clickedLink) {
        clickedLink.classList.add('active');
      }
    }
  </script>

</body>

</html>
