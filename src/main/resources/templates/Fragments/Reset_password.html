<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <link rel="stylesheet" href="/CSS/Login.css">
</head>

<body>
<div class="card-wrap">

  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3L2 8.5L12 14L22 8.5L12 3Z" fill="#c6a84b" stroke="#c6a84b" stroke-width="1.2"
              stroke-linejoin="round" />
        <path d="M6 11V17C6 17 8.5 19.5 12 19.5C15.5 19.5 18 17 18 17V11" stroke="#fff" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round" />
        <line x1="22" y1="8.5" x2="22" y2="14" stroke="#c6a84b" stroke-width="1.6" stroke-linecap="round" />
        <circle cx="22" cy="15" r="1" fill="#c6a84b" />
      </svg>
    </div>
    <h1>UOR</h1>
    <p>Faculty of Technology</p>
    <small>Event Management System</small>
  </div>

  <div class="card">
    <h2 class="card-title">Set New Password</h2>
    <p style="color:#666; font-size:0.875rem; margin-bottom:1.2rem;">
      Must be at least 6 characters.
    </p>

    <form action="/forgot-password/reset" method="post">

      <div class="field">
        <label>New Password</label>
        <div class="password-wrap">
          <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required />
          <button type="button" class="toggle-pw" onclick="togglePw('newPassword','eA1','eA2')">
            <svg id="eA1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg id="eA2" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label>Confirm Password</label>
        <div class="password-wrap">
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter new password"
                 required />
          <button type="button" class="toggle-pw" onclick="togglePw('confirmPassword','eB1','eB2')">
            <svg id="eB1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg id="eB2" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94" />
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>
      </div>

      <p style="color:red; margin-top:8px;" th:if="${error}" th:text="${error}"></p>

      <button type="submit" class="btn-signin">Reset Password</button>

      <p style="text-align:center; margin-top:1rem; font-size:0.875rem;">
        <a href="/login" style="color:#1e3a6e; text-decoration:none;">← Back to Login</a>
      </p>

    </form>
  </div>
</div>

<script>
  function togglePw(inputId, showId, hideId) {
    const input = document.getElementById(inputId);
    const show = document.getElementById(showId);
    const hide = document.getElementById(hideId);
    if (input.type === 'password') {
      input.type = 'text';
      show.style.display = 'none';
      hide.style.display = 'block';
    } else {
      input.type = 'password';
      show.style.display = 'block';
      hide.style.display = 'none';
    }
  }
</script>
</body>

</html>
