<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <link rel="stylesheet" href="/CSS/Login.css">
</head>

<body>

<div class="card-wrap">

  <!-- Branding -->
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3L2 8.5L12 14L22 8.5L12 3Z" fill="#c6a84b" stroke="#c6a84b" stroke-width="1.2"
              stroke-linejoin="round" />
        <path d="M6 11V17C6 17 8.5 19.5 12 19.5C15.5 19.5 18 17 18 17V11" stroke="#fff" stroke-width="1.6"
              stroke-linecap="round" stroke-linejoin="round" />
        <line x1="22" y1="8.5" x2="22" y2="14" stroke="#c6a84b" stroke-width="1.6" stroke-linecap="round" />
        <circle cx="22" cy="15" r="1" fill="#c6a84b" />
      </svg>
    </div>
    <h1>UOR</h1>
    <p>Faculty of Technology</p>
    <small>Event Management System</small>
  </div>

  <!-- Card -->
  <div class="card">

    <h2 class="card-title">Sign In to Your Account</h2>

    <!-- FORM START -->
    <form action="/login" method="post">

      <!-- Hidden Role -->
      <input type="hidden" name="role" id="role" value="ADMIN">

      <!-- Role Selection -->
      <p class="role-label">Select Your Role</p>
      <div class="role-grid">

        <!-- Admin -->
        <div class="role-btn active" onclick="selectRole(this,'ADMIN')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
               stroke-linejoin="round">
            <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7z" />
            <polyline points="9 12 11 14 15 10" />
          </svg>
          <span>Admin</span>
        </div>

        <!-- Organizer -->
        <div class="role-btn" onclick="selectRole(this,'ORGANIZER')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
               stroke-linejoin="round">
            <path d="M3 11l19-9-9 19-2-8-8-2z" />
          </svg>
          <span>Organizer</span>
        </div>

        <!-- Student -->
        <div class="role-btn" onclick="selectRole(this,'STUDENT')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
               stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />
          </svg>
          <span>Student</span>
        </div>

      </div>

      <!-- Form -->
      <div class="field">
        <label for="userid">UserId</label>
        <input type="text" id="userid" name="userid" placeholder="Enter your userid" required />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>

      <div class="row-check">
        <label>
          <input type="checkbox" /> Remember me
        </label>
        <a class="forgot" href="#">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-signin">Sign In</button>

      <!-- Error Message -->
      <p style="color:red; margin-top:10px;" th:text="${error}"></p>

    </form>
    <!-- FORM END -->

  </div>

</div>

<script>
  function selectRole(el, role) {
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById("role").value = role;
  }
</script>

</body>

</html>
