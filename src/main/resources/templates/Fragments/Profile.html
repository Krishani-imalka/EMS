<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <link rel="stylesheet" href="/CSS/Header.css">
  <link rel="stylesheet" href="/CSS/Profile.css">

</head>

<body>

  <div class="profile-wrap">

    <!-- Blue banner -->
    <div class="profile-banner"></div>

    <!-- Photo + upload -->
    <div class="profile-photo-section">
      <div class="profile-photo">
        <img th:if="${profileImage != null and !#strings.isEmpty(profileImage)}"
          th:src="@{'/uploads/profiles/' + ${profileImage}}" alt="Profile Photo" />
        <span th:if="${profileImage == null or #strings.isEmpty(profileImage)}"
          th:text="${#strings.toUpperCase(#strings.substring(fullName, 0, 1))}">U</span>
      </div>

      <!-- Auto-submit file picker -->
      <form action="/profile/upload-photo" method="post" enctype="multipart/form-data">
        <input type="file" id="photoInput" name="photo" accept="image/png, image/jpeg" style="display:none;"
          onchange="this.form.submit()" />
        <button type="button" class="change-photo-btn" onclick="document.getElementById('photoInput').click()">
          Change Photo
        </button>
      </form>
    </div>

    <!-- Profile body -->
    <div class="profile-body">

      <!-- Name -->
      <div class="profile-name" th:text="${fullName}">Full Name</div>

      <!-- Role + Status badges -->
      <div class="profile-meta">
        <span class="profile-badge" th:classappend="${role == 'ADMIN'} ? 'badge-admin' :
                            (${role == 'ORGANIZER'} ? 'badge-organizer' : 'badge-student')"
          th:text="${role}">ROLE</span>

        <span class="profile-badge" th:classappend="${status == 'ACTIVE'} ? 'status-active' :
                            (${status == 'PENDING'} ? 'status-pending' : 'status-blocked')"
          th:text="${status}">STATUS</span>
      </div>

      <!-- Details grid -->
      <div class="profile-grid">

        <div class="profile-field">
          <label>Username</label>
          <div class="val" th:text="${userName}"></div>
        </div>

        <div class="profile-field">
          <label>Department</label>
          <div class="val" th:classappend="${department == null or #strings.isEmpty(department)} ? 'empty'"
            th:text="${(department != null and !#strings.isEmpty(department)) ? department : 'Not provided'}">
          </div>
        </div>

        <div class="profile-field full">
          <label>Email</label>
          <div class="val" th:text="${email}"></div>
        </div>

        <div class="profile-field full">
          <label>Phone</label>
          <div class="val" th:classappend="${phone == null or #strings.isEmpty(phone)} ? 'empty'"
            th:text="${(phone != null and !#strings.isEmpty(phone)) ? phone : 'Not provided'}">
          </div>
        </div>

      </div>

      <!-- Back link -->
      <a class="back-link" th:href="${role == 'ADMIN'}      ? '/admin/dashboard'     :
                (${role == 'ORGANIZER'} ? '/organizer/dashboard' : '/student/dashboard')">
        ← Back to Dashboard
      </a>

    </div>
  </div>

</body>

</html>
