<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <link rel="stylesheet" href="/CSS/Login.css">
</head>

<body>
  <div class="card-wrap">

    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3L2 8.5L12 14L22 8.5L12 3Z" fill="#c6a84b" stroke="#c6a84b" stroke-width="1.2"
            stroke-linejoin="round" />
          <path d="M6 11V17C6 17 8.5 19.5 12 19.5C15.5 19.5 18 17 18 17V11" stroke="#fff" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round" />
          <line x1="22" y1="8.5" x2="22" y2="14" stroke="#c6a84b" stroke-width="1.6" stroke-linecap="round" />
          <circle cx="22" cy="15" r="1" fill="#c6a84b" />
        </svg>
      </div>
      <h1>UOR</h1>
      <p>Faculty of Technology</p>
      <small>Event Management System</small>
    </div>

    <div class="card">
      <h2 class="card-title">Reset Your Password</h2>
      <p style="color:#666; font-size:0.875rem; margin-bottom:1.2rem;">
        Enter your User ID and registered email to verify your identity.
      </p>

      <form action="/forgot-password/verify" method="post">

        <div class="field">
          <label for="userid">User ID</label>
          <input type="text" id="userid" name="userid" placeholder="e.g. U001" required />
        </div>

        <div class="field">
          <label for="email">Registered Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your registered email" required />
        </div>

        <p style="color:red; margin-top:8px;" th:if="${error}" th:text="${error}"></p>

        <button type="submit" class="btn-signin">Verify &amp; Continue</button>

        <p style="text-align:center; margin-top:1rem; font-size:0.875rem;">
          <a href="/login" style="color:#1e3a6e; text-decoration:none;">← Back to Login</a>
        </p>

      </form>
    </div>
  </div>
</body>

</html>
