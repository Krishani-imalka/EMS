<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="stylesheet" href="/CSS/Header.css">
</head>

<body>
  <header th:fragment="header(pageTitle)" class="top-header">

    <div class="header-left">
      <h1 class="page-title" th:text="${pageTitle}">Dashboard</h1>
    </div>

    <div class="header-right">

      <button class="notif-btn" aria-label="Notifications">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6 6 0 10-12 0v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
        </svg>
        <span class="notif-dot"></span>
      </button>

      <div class="user-info" onclick="toggleProfileMenu()" style="cursor:pointer; position:relative;">
        <div class="user-details">
          <div class="user-name" th:text="${session.loggedInName} ?: 'User'">
            User
          </div>
          <span class="user-badge"
                th:classappend="${session.loggedInRole == 'ADMIN'} ? 'badge-admin' :
                              (${session.loggedInRole == 'ORGANIZER'} ? 'badge-organizer' : 'badge-student')"
                th:text="${session.loggedInRole} ?: 'ROLE'">
          ROLE
        </span>
        </div>
        <!-- Avatar: profile image OR initials -->
        <div class="avatar">
          <img th:if="${session.loggedInUser != null and session.loggedInUser.profileImage != null
                      and !#strings.isEmpty(session.loggedInUser.profileImage)}"
               th:src="@{'/uploads/profiles/' + ${session.loggedInUser.profileImage}}"
               alt="Profile Photo"
               style="width:100%; height:100%; border-radius:50%; object-fit:cover;"/>

          <!-- Initials fallback when no profile image -->
          <span th:if="${session.loggedInUser == null or session.loggedInUser.profileImage == null
                       or #strings.isEmpty(session.loggedInUser.profileImage)}"
                class="avatar-initials"
                th:text="${session.loggedInName != null}
                        ? ${#strings.toUpperCase(#strings.substring(session.loggedInName, 0, 1))}
                        : 'U'">U</span>
        </div>

        <!-- Dropdown -->
        <div class="profile-dropdown" id="profileDropdown" style="display:none;">

          <!-- User Info Block -->
          <div class="dropdown-header">
            <div class="dropdown-avatar">
              <img th:if="${session.loggedInUser != null and session.loggedInUser.profileImage != null
                          and !#strings.isEmpty(session.loggedInUser.profileImage)}"
                   th:src="@{'/uploads/profiles/' + ${session.loggedInUser.profileImage}}"
                   alt="Profile"/>
              <span th:if="${session.loggedInUser == null or session.loggedInUser.profileImage == null
                           or #strings.isEmpty(session.loggedInUser.profileImage)}"
                    th:text="${session.loggedInName != null}
                            ? ${#strings.toUpperCase(#strings.substring(session.loggedInName, 0, 1))}
                            : 'U'">U</span>
            </div>
            <div class="dropdown-info">
              <div class="dropdown-name"   th:text="${session.loggedInName}     ?: 'User'"></div>
              <div class="dropdown-userid" th:text="${'ID: ' + (session.loggedInUserId ?: '')}"></div>
              <div class="dropdown-email"
                   th:text="${session.loggedInUser != null ? session.loggedInUser.email : ''}"></div>
              <div class="dropdown-dept"
                   th:if="${session.loggedInUser != null and session.loggedInUser.department != null}"
                   th:text="${session.loggedInUser.department}"></div>
            </div>
          </div>

          <hr class="dropdown-divider"/>

          <!-- My Profile link -->
          <a class="dropdown-item"
             th:href="${session.loggedInRole == 'ADMIN'}      ? '/admin/profile'     :
                    (${session.loggedInRole == 'ORGANIZER'} ? '/organizer/profile' : '/student/profile')"
             onclick="event.stopPropagation();">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            My Profile
          </a>

          <hr class="dropdown-divider"/>

          <a class="dropdown-item dropdown-logout" href="/logout"
             onclick="event.stopPropagation(); window.top.location.href='/logout'; return false;">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Logout
          </a>
        </div>

      </div>
    </div>
  </header>

  <script>
    function toggleProfileMenu() {
      const menu = document.getElementById('profileDropdown');
      menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
      const userInfo = document.querySelector('.user-info');
      const dropdown = document.getElementById('profileDropdown');
      if (dropdown && userInfo && !userInfo.contains(e.target)) {
        dropdown.style.display = 'none';
      }
    });
  </script>
</body>
</html>
