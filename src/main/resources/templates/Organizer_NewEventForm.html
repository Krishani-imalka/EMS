<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="/CSS/Header.css"/>
    <link rel="stylesheet" href="/CSS/Organizer_NewEventForm.css">
</head>

<body class="p-4">
<div th:replace="~{Fragments/Header :: header('Create new Events')}"></div>

    <div class="container">
        <div class="form-box">

            <h4>Event Details</h4>

            <form>
                <div class="mb-3">
                    <label>Event Name</label>
                    <input type="text" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Description</label>
                    <textarea class="form-control"></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6">
                        <label>Date</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label>Time</label>
                        <input type="time" class="form-control">
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-md-6">
                        <label>Location</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="col-md-6">
                        <label>Venue</label>
                        <input type="text" class="form-control">
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-md-6">
                        <label>Category</label>
                        <select class="form-control">
                            <option>Workshop</option>
                            <option>Seminar</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label>Expected Attendees</label>
                        <input type="number" class="form-control">
                    </div>
                </div>

                <div class="mt-3">
                    <label>Contact</label>
                    <input type="text" class="form-control">
                </div>

                <div class="mt-3">
                    <label>Upload Image</label>
                    <input type="file" class="form-control">
                </div>

                <div class="mt-4">
                    <button class="btn btn-primary">Submit</button>
                    <a href="dashboard.html" class="btn btn-secondary">Cancel</a>
                </div>

            </form>
        </div>
    </div>

</body>

</html>
