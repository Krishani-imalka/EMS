<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="stylesheet" href="/CSS/Header.css"/>
    <link rel="stylesheet" href="/CSS/Organizer_NewEventForm.css">
</head>

<body>
<div th:replace="~{Fragments/Header :: header('Create new Events')}"></div>
<br>

<div class="alert-wrapper">
    <div th:if="${successMessage}" class="alert-success">
        <span class="alert-icon">✓</span>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert-error">
        <span class="alert-icon">✕</span>
        <span th:text="${errorMessage}"></span>
    </div>
</div>
<div class="page-wrapper">
    <div class="form-card">

        <h5 class="form-title">Event Details</h5>

        <form th:action="@{/organizer/createEvent}" method="post" enctype="multipart/form-data">

            <div class="field-group">
                <label class="field-label">Event Name</label>
                <input type="text" name="eventName" class="field-input" placeholder="Enter event name" required>
            </div>

            <div class="field-group">
                <label class="field-label">Description</label>
                <textarea name="description" class="field-input field-textarea" placeholder="Describe the event..." required></textarea>
            </div>

            <div class="field-row">
                <div class="field-group">
                    <label class="field-label">Date</label>
                    <input type="date" name="eventDate" class="field-input" required>
                </div>
                <div class="field-group">
                    <label class="field-label">Start Time</label>
                    <input type="time" name="startTime" class="field-input" required>
                </div>
            </div>

            <div class="field-row">
                <div class="field-group">
                    <label class="field-label">End Time</label>
                    <input type="time" name="endTime" class="field-input" required>
                </div>
                <div class="field-group">
                    <label class="field-label">Location</label>
                    <input type="text" name="location" class="field-input" placeholder="e.g., Faculty of Technology" required>
                </div>
            </div>

            <div class="field-row">
                <div class="field-group">
                    <label class="field-label">Venue <span class="optional">(optional)</span></label>
                    <select name="venueName" class="field-input field-select">
                        <option value="">-- Select a Venue --</option>
                        <option th:each="venue : ${venues}"
                                th:value="${venue.vName}"
                                th:text="${venue.vName}">
                        </option>
                    </select>
                </div>
                <div class="field-group">
                    <label class="field-label">Category</label>
                    <select name="category" class="field-input field-select" required>
                        <option value="">Select category</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat}"
                                th:text="${cat}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="field-row">
                <div class="field-group">
                    <label class="field-label">Expected Attendees</label>
                    <input type="number" name="expectedAttendees" class="field-input" placeholder="e.g., 150" min="1" required>
                </div>
                <div class="field-group">
                    <label class="field-label">Contact Information</label>
                    <input type="text" name="contactInfo" class="field-input" placeholder="Phone or email for inquiries" required>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label">Event Banner Image <span class="optional">(optional)</span></label>
                <label class="upload-box" id="uploadBox">
                    <input type="file" name="bannerImage" accept="image/*" class="upload-input"
                           id="bannerInput" onchange="handleFileSelect(this)">
                    <div class="upload-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <p class="upload-text" id="uploadText">Click to upload or drag and drop</p>
                    <p class="upload-hint">PNG, JPG up to 5MB</p>
                    <p class="upload-filename" id="uploadFilename"></p>
                </label>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Submit Event</button>
                <a th:href="@{/organizer/dashboard}" class="btn-cancel" role="button">Cancel</a>
            </div>

        </form>
    </div>
</div>

<script>
    function handleFileSelect(input) {
        const filename = document.getElementById('uploadFilename');
        const uploadText = document.getElementById('uploadText');
        const uploadBox = document.getElementById('uploadBox');

        if (input.files && input.files[0]) {
            const file = input.files[0];

            // Validate size (5MB)
            if (file.size > 5 * 1024 * 1024) {
                filename.textContent = '';
                uploadText.textContent = 'File too large! Max 5MB.';
                uploadText.style.color = '#991b1b';
                input.value = '';
                return;
            }

            filename.textContent = '✓ ' + file.name;
            uploadText.textContent = 'File selected';
            uploadText.style.color = '#15803d';
            uploadBox.style.borderColor = '#6366f1';
            uploadBox.style.background = '#f3f4ff';
        } else {
            filename.textContent = '';
            uploadText.textContent = 'Click to upload or drag and drop';
            uploadText.style.color = '';
            uploadBox.style.borderColor = '';
            uploadBox.style.background = '';
        }
    }
</script>

</body>
</html>
